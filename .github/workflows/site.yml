name: Site

env:
  IS_RELEASE: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}

on:
  workflow_call:
  push:
    branches:
      - main
      - dev
    paths:
      - site/**
      - .github/workflows/site.yml

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Download appcast artifact
        if: env.IS_RELEASE == 'true'
        uses: actions/download-artifact@v8
        with:
          name: appcast-files
          path: artifacts/appcast

      - name: Copy appcast files when available
        if: env.IS_RELEASE == 'true'
        run: |
          set -euo pipefail
          cp ../artifacts/appcast/dmg-arm64/appcast-arm64.xml static/appcast-arm64.xml
          cp ../artifacts/appcast/dmg-x86_64/appcast-x86_64.xml static/appcast-x86_64.xml

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_stable_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')"
          app_version="${latest_stable_tag#v}"

          arm64_size_mb=""
          x86_size_mb=""
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${latest_stable_tag}")"
          arm64_bytes="$(printf '%s' "${release_json}" | jq -r --arg v "${app_version}" '[.assets[] | select(.name == ("AudioVideoMerger-darwin-arm64-" + $v + ".dmg")) | .size][0]')"
          x86_bytes="$(printf '%s' "${release_json}" | jq -r --arg v "${app_version}" '[.assets[] | select(.name == ("AudioVideoMerger-darwin-x86_64-" + $v + ".dmg")) | .size][0]')"

          if [ -n "${arm64_bytes}" ] && [ "${arm64_bytes}" != "null" ]; then
            arm64_size_mb="$(python3 -c "print(f'{int(${arm64_bytes}) / 1048576:.1f}')")"
          fi
          if [ -n "${x86_bytes}" ] && [ "${x86_bytes}" != "null" ]; then
            x86_size_mb="$(python3 -c "print(f'{int(${x86_bytes}) / 1048576:.1f}')")"
          fi

          HUGO_APP_VERSION="${app_version}" \
          HUGO_ARM64_SIZE_MB="${arm64_size_mb}" \
          HUGO_X86_SIZE_MB="${x86_size_mb}" \
          npm run build

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-public
          path: site/public
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: site-deploy
      cancel-in-progress: true
    steps:

      - name: Check out target repo
        uses: actions/checkout@v6
        with:
          repository: audiovideomerger/audiovideomerger.github.io
          token: ${{ secrets.PUSH_SITE_TOKEN }}
          path: target-repo

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-public
          path: public

      - name: Replace published files
        run: |
          set -euo pipefail
          if [ "${IS_RELEASE}" = "true" ]; then
            rsync -a --delete --exclude '.git/' public/ target-repo/
          else
            rsync -a --delete \
              --exclude '.git/' \
              --exclude 'appcast-arm64.xml' \
              --exclude 'appcast-x86_64.xml' \
              public/ target-repo/
          fi

      - name: Commit and push
        working-directory: ./target-repo
        run: |
          git config user.name "audiovideomerger"
          git config user.email "${{ secrets.PUSH_SITE_EMAIL }}"

          git add .
          git diff --cached --quiet && exit 0

          git commit -m "Update from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push
