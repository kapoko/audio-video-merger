name: Site

on:
  workflow_call:
    inputs:
      include_appcast:
        description: Include generated appcast files
        required: false
        type: boolean
        default: false
      release_tag:
        description: Release tag for version display
        required: false
        type: string
        default: ""
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Download appcast artifact
        if: ${{ inputs.include_appcast }}
        uses: actions/download-artifact@v8
        with:
          name: appcast-files
          path: artifacts/appcast

      - name: Copy generated appcast files
        if: ${{ inputs.include_appcast }}
        run: |
          set -euo pipefail
          cp ../artifacts/appcast/appcast-arm64.xml static/appcast-arm64.xml
          cp ../artifacts/appcast/appcast-x86_64.xml static/appcast-x86_64.xml

      - name: Set app version
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            app_version="${RELEASE_TAG#v}"
          else
            app_version="$(tr -d '[:space:]' < ../VERSION)"
          fi

          test -n "${app_version}"
          printf 'HUGO_APP_VERSION=%s\n' "${app_version}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-public
          path: site/public
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:

      - name: Check out target repo
        uses: actions/checkout@v6
        with:
          repository: audiovideomerger/audiovideomerger.github.io
          token: ${{ secrets.API_TOKEN_GITHUB }}
          path: target-repo

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-public
          path: public

      - name: Replace published files
        env:
          INCLUDE_APPCAST: ${{ inputs.include_appcast }}
        run: |
          set -euo pipefail
          if [ "${INCLUDE_APPCAST}" = "true" ]; then
            rsync -a --delete public/ target-repo/
          else
            rsync -a --delete \
              --exclude 'appcast-arm64.xml' \
              --exclude 'appcast-x86_64.xml' \
              public/ target-repo/
          fi

      - name: Commit and push
        working-directory: ./target-repo
        run: |
          git config user.name "audiovideomerger"
          git config user.email "${{ secrets.ARTIFACT_EMAIL }}"

          git add .
          git diff --cached --quiet && exit 0

          git commit -m "Update from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push
