name: Site

on:
  workflow_call:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Resolve latest stable release version
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          stable_tag="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/kapoko/audio-video-merger/releases?per_page=50" \
            | jq -r 'map(select(.draft == false and .prerelease == false)) | first | .tag_name // empty')"

          test -n "$stable_tag"
          stable_version="${stable_tag#v}"
          test -n "$stable_version"

          printf 'HUGO_APP_VERSION=%s\n' "$stable_version" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-public
          path: site/public
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:

      - name: Check out target repo
        uses: actions/checkout@v6
        with:
          repository: audiovideomerger/audiovideomerger.github.io
          token: ${{ secrets.API_TOKEN_GITHUB }}
          path: target-repo

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-public
          path: public

      - name: Replace published files
        run: |
          rm -rf target-repo/*
          cp -R public/. target-repo/

      - name: Commit and push
        working-directory: ./target-repo
        run: |
          git config user.name "audiovideomerger"
          git config user.email "${{ secrets.ARTIFACT_EMAIL }}"

          git add .
          git diff --cached --quiet && exit 0

          git commit -m "Update from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push
