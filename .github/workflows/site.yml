name: Site

env:
  IS_RELEASE: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}

on:
  workflow_call:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Download appcast artifact
        if: env.IS_RELEASE == 'true'
        uses: actions/download-artifact@v8
        with:
          name: appcast-files
          path: artifacts/appcast

      - name: Copy appcast files when available
        if: env.IS_RELEASE == 'true'
        run: |
          set -euo pipefail
          cp ../artifacts/appcast/dmg-arm64/appcast-arm64.xml static/appcast-arm64.xml
          cp ../artifacts/appcast/dmg-x86_64/appcast-x86_64.xml static/appcast-x86_64.xml

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_stable_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')"
          HUGO_APP_VERSION="${latest_stable_tag#v}" npm run build

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-public
          path: site/public
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: site-deploy
      cancel-in-progress: true
    steps:

      - name: Check out target repo
        uses: actions/checkout@v6
        with:
          repository: audiovideomerger/audiovideomerger.github.io
          token: ${{ secrets.API_TOKEN_GITHUB }}
          path: target-repo

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-public
          path: public

      - name: Replace published files
        run: |
          set -euo pipefail
          if [ "${IS_RELEASE}" = "true" ]; then
            rsync -a --delete --exclude '.git/' public/ target-repo/
          else
            rsync -a --delete \
              --exclude '.git/' \
              public/ target-repo/
          fi

      - name: Commit and push
        working-directory: ./target-repo
        run: |
          git config user.name "audiovideomerger"
          git config user.email "${{ secrets.ARTIFACT_EMAIL }}"

          git add .
          git diff --cached --quiet && exit 0

          git commit -m "Update from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push
