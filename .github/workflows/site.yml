name: Site

env:
  IS_RELEASE: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}

on:
  workflow_call:
  push:
    branches:
      - main
      - dev
    paths:
      - site/**
      - .github/workflows/site.yml

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./site

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Download appcast artifact
        if: env.IS_RELEASE == 'true'
        uses: actions/download-artifact@v8
        with:
          name: appcast-files
          path: artifacts/appcast

      - name: Copy appcast files when available
        if: env.IS_RELEASE == 'true'
        run: |
          set -euo pipefail
          cp ../artifacts/appcast/dmg-arm64/appcast-arm64.xml static/appcast-arm64.xml
          cp ../artifacts/appcast/dmg-x86_64/appcast-x86_64.xml static/appcast-x86_64.xml

      - name: Preserve existing appcast files on non-release
        if: env.IS_RELEASE != 'true'
        run: |
          set -euo pipefail
          curl -fsSL "https://audiovideomerger.koman.app/appcast-arm64.xml" -o static/appcast-arm64.xml
          curl -fsSL "https://audiovideomerger.koman.app/appcast-x86_64.xml" -o static/appcast-x86_64.xml

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_stable_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')"
          app_version="${latest_stable_tag#v}"

          arm64_size_mb=""
          x86_size_mb=""
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${latest_stable_tag}")"
          arm64_bytes="$(printf '%s' "${release_json}" | jq -r --arg v "${app_version}" '[.assets[] | select(.name == ("AudioVideoMerger-darwin-arm64-" + $v + ".dmg")) | .size][0]')"
          x86_bytes="$(printf '%s' "${release_json}" | jq -r --arg v "${app_version}" '[.assets[] | select(.name == ("AudioVideoMerger-darwin-x86_64-" + $v + ".dmg")) | .size][0]')"

          if [ -n "${arm64_bytes}" ] && [ "${arm64_bytes}" != "null" ]; then
            arm64_size_mb="$(python3 -c "print(f'{int(${arm64_bytes}) / 1048576:.1f}')")"
          fi
          if [ -n "${x86_bytes}" ] && [ "${x86_bytes}" != "null" ]; then
            x86_size_mb="$(python3 -c "print(f'{int(${x86_bytes}) / 1048576:.1f}')")"
          fi

          HUGO_APP_VERSION="${app_version}" \
          HUGO_ARM64_SIZE_MB="${arm64_size_mb}" \
          HUGO_X86_SIZE_MB="${x86_size_mb}" \
          npm run build

      - name: Upload legacy site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-public
          path: site/public
          if-no-files-found: error

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_id }}
          path: site/public

  deploy-legacy:
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: site-deploy-legacy
      cancel-in-progress: true
    steps:

      - name: Check out source repo
        uses: actions/checkout@v6
        with:
          path: source-repo

      - name: Check out target repo
        uses: actions/checkout@v6
        with:
          repository: audiovideomerger/audiovideomerger.github.io
          token: ${{ secrets.PUSH_SITE_TOKEN }}
          path: target-repo

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-public
          path: public

      - name: Replace published files
        run: |
          set -euo pipefail
          find target-repo -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name 'appcast-arm64.xml' \
            ! -name 'appcast-x86_64.xml' \
            -exec rm -rf {} +

          cp public/appcast-arm64.xml target-repo/appcast-arm64.xml
          cp public/appcast-x86_64.xml target-repo/appcast-x86_64.xml
          cp source-repo/.github/legacy-site/index.html target-repo/index.html
          cp source-repo/.github/legacy-site/404.html target-repo/404.html

      - name: Commit and push
        working-directory: ./target-repo
        run: |
          git config user.name "audiovideomerger"
          git config user.email "${{ secrets.PUSH_SITE_EMAIL }}"

          git add .
          git diff --cached --quiet && exit 0

          git commit -m "Update from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    concurrency:
      group: site-deploy
      cancel-in-progress: true
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_id }}
