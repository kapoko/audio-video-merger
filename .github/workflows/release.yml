name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release-metadata:
    uses: ./.github/workflows/release-metadata.yml

  release:
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate tag matches VERSION
        run: |
          set -euo pipefail
          expected_tag="v$(tr -d '[:space:]' < VERSION)"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION (${expected_tag})"
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dmg-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          files: dist/*.dmg

  appcast:
    needs:
      - release
      - release-metadata
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Seed existing appcasts
        run: |
          set -euo pipefail
          mkdir -p site/static
          curl -fsSL "https://audiovideomerger.github.io/appcast-arm64.xml" -o site/static/appcast-arm64.xml || true
          curl -fsSL "https://audiovideomerger.github.io/appcast-x86_64.xml" -o site/static/appcast-x86_64.xml || true

      - name: Download stable release assets
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_TAG: ${{ needs.release-metadata.outputs.stable_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist-appcast
          gh release download "${STABLE_TAG}" \
            --dir dist-appcast \
            --pattern 'AudioVideoMerger-darwin-arm64-*.dmg' \
            --pattern 'AudioVideoMerger-darwin-arm64-*.zip' \
            --pattern 'AudioVideoMerger-darwin-x86_64-*.dmg' \
            --pattern 'AudioVideoMerger-darwin-x64-*.zip'

      - name: Generate stable appcast entries
        env:
          REPO: ${{ github.repository }}
          STABLE_TAG: ${{ needs.release-metadata.outputs.stable_tag }}
        run: |
          set -euo pipefail
          swift package resolve
          ./site/scripts/generate_appcast.sh ./dist-appcast ./site/static "${STABLE_TAG}" "${REPO}"

      - name: Download release assets for beta channel
        if: contains(github.ref_name, 'beta')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release download "${RELEASE_TAG}" \
            --dir dist-appcast \
            --pattern 'AudioVideoMerger-darwin-arm64-*.dmg' \
            --pattern 'AudioVideoMerger-darwin-arm64-*.zip' \
            --pattern 'AudioVideoMerger-darwin-x86_64-*.dmg' \
            --pattern 'AudioVideoMerger-darwin-x64-*.zip'

      - name: Generate beta appcast entries
        env:
          RELEASE_TAG: ${{ contains(github.ref_name, 'beta') && github.ref_name || needs.release-metadata.outputs.stable_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ./site/scripts/generate_appcast.sh ./dist-appcast ./site/static "${RELEASE_TAG}" "${REPO}" "beta"

      - name: Upload appcast artifact
        uses: actions/upload-artifact@v7
        with:
          name: appcast-files
          path: |
            site/static/appcast-arm64.xml
            site/static/appcast-x86_64.xml
          if-no-files-found: error

  site:
    needs:
      - release
      - appcast
      - release-metadata
    uses: ./.github/workflows/site.yml
    with:
      include_appcast: true
      app_version: ${{ needs.release-metadata.outputs.app_version }}
    secrets: inherit
