name: Release Metadata

on:
  workflow_call:
    inputs:
      app_version_override:
        description: Explicit app version override
        required: false
        type: string
        default: ""
    outputs:
      app_version:
        description: App version for site links
        value: ${{ jobs.resolve.outputs.app_version }}
      stable_tag:
        description: Latest stable release tag
        value: ${{ jobs.resolve.outputs.stable_tag }}

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.values.outputs.app_version }}
      stable_tag: ${{ steps.values.outputs.stable_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve metadata values
        id: values
        env:
          APP_VERSION_OVERRIDE: ${{ inputs.app_version_override }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -n "${APP_VERSION_OVERRIDE}" ]; then
            app_version="${APP_VERSION_OVERRIDE}"
            stable_tag="v${APP_VERSION_OVERRIDE}"
          else
            stable_tag="$(gh release list \
              --repo "${GITHUB_REPOSITORY}" \
              --exclude-pre-releases \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName')"

            if [ -n "${stable_tag}" ]; then
              app_version="${stable_tag#v}"
            else
              app_version="$(tr -d '[:space:]' < VERSION)"
              stable_tag="v${app_version}"
            fi
          fi

          printf 'app_version=%s\n' "${app_version}" >> "$GITHUB_OUTPUT"
          printf 'stable_tag=%s\n' "${stable_tag}" >> "$GITHUB_OUTPUT"
