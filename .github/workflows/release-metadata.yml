name: Release Metadata

on:
  workflow_call:
    inputs:
      app_version_override:
        description: Explicit app version override
        required: false
        type: string
        default: ""
    outputs:
      app_version:
        description: App version for site links
        value: ${{ jobs.resolve.outputs.app_version }}

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.values.outputs.app_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve metadata values
        id: values
        env:
          APP_VERSION_OVERRIDE: ${{ inputs.app_version_override }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -n "${APP_VERSION_OVERRIDE}" ]; then
            app_version="${APP_VERSION_OVERRIDE}"
          else
            stable_tag="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=50" \
              | jq -r 'map(select(.draft == false and .prerelease == false)) | first | .tag_name // empty')"

            if [ -n "${stable_tag}" ]; then
              app_version="${stable_tag#v}"
            else
              app_version="$(tr -d '[:space:]' < VERSION)"
            fi
          fi

          printf 'app_version=%s\n' "${app_version}" >> "$GITHUB_OUTPUT"
