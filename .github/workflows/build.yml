name: Build

on:
  workflow_call:
  push:
    branches:
      - main
      - dev

jobs:
  checks:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Swift format lint
        run: swift format lint -r src --strict

      - name: Run tests
        run: swift test

  build:
    needs: checks
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and package DMG
        run: make dmg-${{ matrix.arch }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/AudioVideoMerger-darwin-${{ matrix.arch }}-*.dmg
          if-no-files-found: error
          compression-level: 0
