name: Build

on:
  workflow_call:
  push:
    branches:
      - main
      - dev

jobs:
  checks:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Swift format lint
        run: swift format lint -r src --strict

      - name: Run tests
        run: swift test

  build:
    needs: checks
    runs-on: macos-26
    env:
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12_B64: ${{ secrets.MACOS_CERT_P12_B64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          test -n "${MACOS_CERT_P12_B64}"
          test -n "${MACOS_CERT_PASSWORD}"
          test -n "${MACOS_SIGNING_IDENTITY}"

          KEYCHAIN_PATH="$RUNNER_TEMP/notary-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "${MACOS_CERT_P12_B64}" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security >/dev/null
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null 2>&1

          echo "CI_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Build and package DMG
        run: make dmg-${{ matrix.arch }}

      - name: Verify code signing
        run: |
          set -euo pipefail
          app="dist/apps/Audio Video Merger-${{ matrix.arch }}.app"
          ffmpeg_bin="$app/Contents/Resources/ffmpeg-${{ matrix.arch }}"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign --display --verbose=2 "$app"
          codesign --display --verbose=4 "$ffmpeg_bin"

      - name: Sign DMG
        run: |
          set -euo pipefail
          dmg="$(ls dist/AudioVideoMerger-darwin-${{ matrix.arch }}-*.dmg)"
          codesign --force --sign "$MACOS_SIGNING_IDENTITY" --timestamp "$dmg"
          codesign --verify --verbose=2 "$dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: dmg-${{ matrix.arch }}
          path: dist/AudioVideoMerger-darwin-${{ matrix.arch }}-*.dmg
          if-no-files-found: error
          compression-level: 0
